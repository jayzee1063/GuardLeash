# ┌─────────────────────────────────────────────────────────────┐
# │                       GuardLeash                            │
# │  Поводок для полиции Lunify.                                │
# └─────────────────────────────────────────────────────────────┘

settings:
  # Главное право для использования механики.
  use-permission: "guardleash.use"

  # Игроки с этим правом не могут быть связаны.
  bypass-permission: "guardleash.bypass"

  # Предмет для связывания. По умолчанию обычный ванильный поводок.
  leash-item: "LEAD"

  # Нужно ли забирать поводок из руки при связывании.
  consume-lead: true

  # Нужно ли забирать поводок в креативе.
  consume-lead-in-creative: false

  # Разрешить использовать поводок из второй руки.
  allow-offhand: true

  # Если true, развязать игрока может только тот, кто его связал, или админ.
  only-owner-can-release: false

  # Кому возвращать поводок при ручном развязывании:
  # true  - тому, кто развязал;
  # false - тому, кто изначально связал.
  return-lead-to-releaser: true

  # Как часто обновлять состояние связанных игроков.
  # 1 = каждый тик. 2-3 обычно достаточно и легче для сервера.
  update-interval-ticks: 2

  # Высота невидимой прокси-сущности относительно позиции игрока.
  # От неё рисуется визуальный поводок.
  proxy-y-offset: -0.35

holder-leash:
  # Дистанция, на которой связанный игрок начинает подтягиваться к ведущему.
  follow-distance: 2.8

  # Максимальный шаг подтягивания за один апдейт.
  max-step-per-update: 0.65

  # Базовая скорость мягкого подтягивания связанного игрока к ведущему.
  pull-base-speed: 0.22

  # Насколько сильнее тянуть игрока за каждый лишний блок дистанции.
  pull-speed-per-block: 0.09

  # Вертикальный импульс для подъёма на блоки, чтобы связанный не застревал на ступеньках.
  step-up-velocity: 0.42

  # На каком расстоянии перед связанным проверять блок-ступеньку.
  step-check-distance: 0.75

  # Допуск на попытку движения от ведущего. Чем меньше значение, тем строже блокируется отход назад.
  movement-away-tolerance: 0.08

  # Гасить остаточную скорость, когда связанный уже рядом с ведущим.
  dampen-near-holder: true

  # Если true, при слишком большой дистанции связь разорвётся.
  release-if-too-far: false

  # Дистанция разрыва, если release-if-too-far включён.
  release-distance: 24.0

fence-leash:
  # Разрешить привязывать связанных игроков к забору.
  enabled: true

  # Если полицейский ведёт нескольких игроков и кликает по забору,
  # привязывать всех ведомых игроков к этому забору.
  bind-all-held-targets: true

  # Какие блоки считать забором. По умолчанию используется Bukkit Tag.FENCES.
  # Дополнительные материалы можно добавить ниже.
  extra-fence-materials:
    - "NETHER_BRICK_FENCE"

restrictions:
  # Связанный игрок не может сам двигаться. При поводке к игроку он будет подтягиваться плагином.
  prevent-movement: true

  # Если true, игрок может вращать камерой, но не может ходить.
  allow-looking-around: true

  # Обнулять скорость ходьбы/полёта у связанного и возвращать её при развязке.
  # Это блокирует самостоятельное движение, но не мешает плагину мягко тянуть игрока поводком.
  disable-target-walk-speed: true

  # Запретить связанному игроку прыгать самому.
  # Служебный прыжок/подъём от плагина при взбирании на блоки останется рабочим.
  prevent-jump: true

  # Запретить связанному игроку взаимодействовать с инвентарём.
  prevent-inventory-interact: true

  # Запретить связанному игроку наносить урон.
  prevent-damage: true

  # Запретить взаимодействия ПКМ/ЛКМ, пока игрок связан.
  prevent-interact: true

  prevent-block-break: true
  prevent-block-place: true
  prevent-item-drop: true

  # Запретить внешние телепорты связанного игрока.
  # Внутренние телепорты GuardLeash не блокируются.
  prevent-teleport: true

safety:
  # При выходе задержанного с сервера связь снимается, поводок возвращается владельцу, если он онлайн.
  release-when-target-quits: true

  # При выходе ведущего с сервера все его активные связи снимаются.
  release-when-holder-quits: true

  # Восстанавливать связь, если связанный игрок перезашёл, а ведущий рядом.
  restore-target-leash-on-reconnect: true

  # Радиус восстановления связи после релога связанного игрока.
  reconnect-restore-radius: 16.0

  # Сколько секунд хранить ожидающую связь после выхода связанного игрока.
  # 0 = хранить до рестарта/перезагрузки плагина.
  reconnect-timeout-seconds: 300

  # Задержка после входа игрока перед проверкой восстановления связи.
  reconnect-restore-delay-ticks: 10

  # Возвращать поводок при автоматическом снятии связи.
  return-lead-on-auto-release: true

  # Если инвентарь заполнен, поводок не будет дропаться.
  # Плагин будет пытаться вернуть его позже, когда у игрока появится место.
  keep-pending-leads-when-inventory-full: true

proxy-entity:
  # Внутренняя невидимая сущность, к которой цепляется поводок.
  # Рекомендуется ZOMBIE: стабильно поддерживает leash-holder.
  type: "ZOMBIE"

  # Делать прокси-зомби маленьким, чтобы визуальная точка поводка была ниже головы игрока.
  use-baby-zombie: true

